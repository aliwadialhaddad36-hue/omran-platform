name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write   # needed to post preview URL comment on PRs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ── Build ──────────────────────────────────────────────────────────────
      # NEXT_PUBLIC_* vars are baked into the static bundle at build time.
      # Server-only secrets (STRIPE_SECRET_KEY, SUPABASE_SERVICE_ROLE_KEY,
      # STRIPE_WEBHOOK_SECRET) must be set in Cloudflare Pages dashboard →
      # Settings → Environment Variables, NOT here.
      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      # ── Deploy (main branch → production) ─────────────────────────────────
      - name: Deploy (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy .vercel/output/static
            --project-name=omran-platform
            --branch=main
            --commit-dirty=true

      # ── Deploy (PR → preview URL) ──────────────────────────────────────────
      - name: Deploy (Preview)
        if: github.event_name == 'pull_request'
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy .vercel/output/static
            --project-name=omran-platform
            --branch=${{ github.head_ref }}
            --commit-dirty=true

      # Post preview URL as a PR comment
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **Preview deployed!**\n\n🔗 ' + '${{ steps.preview.outputs.deployment-url }}'
            })
